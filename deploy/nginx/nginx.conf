worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  gzip          on;

  map $http_user_agent $prerender_ua {
    default                                                             0;
    "~*googlebot|bingbot|yandex|baiduspider|duckduckbot|twitterbot"      1;
    "~*facebookexternalhit|linkedinbot|embedly|pinterestbot|slackbot"    1;
    "~*whatsapp|telegrambot|discordbot|vkshare|w3c_validator|skypeuri"   1;
    "~*claudebot|gptbot|perplexitybot|oai-searchbot|chatgpt-user"        1;
    "~*applebot|semrushbot|ahrefsbot|mj12bot"                            1;
  }

  map $uri $prerender_by_ext {
    default                             1;
    "~*\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|doc|txt|ico|rss|zip|mp3|rar|exe|wmv|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|ttf|woff|woff2|svg|eot)$"  0;
  }

  upstream api_backend {
    server api:4000;
  }

  upstream prerender_backend {
    server prerender:3000;
  }

  server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location /api/ {
      proxy_pass         http://api_backend/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      set $prerender 0;
      if ($prerender_ua = 1)     { set $prerender 1; }
      if ($prerender_by_ext = 0) { set $prerender 0; }
      if ($args ~ "_escaped_fragment_")   { set $prerender 1; }

      if ($prerender = 1) {
        rewrite .* /prerender last;
      }

      try_files $uri $uri/ /index.html;
    }

    location /prerender {
      internal;
      proxy_pass         http://prerender_backend/$scheme://$host$request_uri;
      proxy_set_header   X-Prerender-Token $prerender_token;
      proxy_set_header   Host              $host;
      proxy_cache_valid  200 1h;
    }
  }
}
