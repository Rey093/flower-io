services:
  api:
    # Replace with your built Encore API image.
    # Locally you probably run `pnpm dev:api` outside docker; this service is
    # here as a placeholder that nginx can proxy to when you containerise.
    image: flower-io/api:latest
    environment:
      - NODE_ENV=production
    ports:
      - "4000:4000"
    restart: unless-stopped

  prerender:
    build:
      context: ./prerender
    environment:
      - LOG_REQUESTS=0
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - prerender
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../apps/web/dist:/usr/share/nginx/html:ro
    restart: unless-stopped
